<!-- templates/course_form.html -->

{% extends 'layout.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header">
                <h3>{{ title }}</h3>
            </div>
            <div class="card-body">
                <!-- If editing, the form posts to the edit_course route. If adding, it posts to the add_course route. -->
                <form method="POST" action="{{ url_for('edit_course', id=course.id) if course else url_for('add_course') }}">
                    
                    <div class="mb-3">
                        <label for="name" class="form-label">Course Name <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="name" name="name" value="{{ course.name if course else '' }}" required>
                    </div>

                    <div class="mb-3">
                        <label for="description" class="form-label">Description</label>
                        <textarea class="form-control" id="description" name="description" rows="4">{{ course.description if course else '' }}</textarea>
                    </div>

                    <div class="d-flex justify-content-end">
                        <a href="{{ url_for('manage_courses') }}" class="btn btn-secondary me-2">Cancel</a>
                        <button type="submit" class="btn btn-primary">
                            {% if course %}
                                Save Changes
                            {% else %}
                                Add Course
                            {% endif %}
                        </button>
                    </div>

                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
